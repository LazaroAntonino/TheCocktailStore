<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse - The Cocktail Store</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N4JJW6M8" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  
  <header class="header">
    <nav class="nav container">
      <a href="/" class="nav__logo">
        <i class="fas fa-laptop"></i>
        <span class="nav__logo-text">The Cocktail Store</span>
      </a>

      <div class="nav__actions">
        <div id="auth-nav"></div>
      </div>
    </nav>
  </header>

  <main class="main">
    <section class="auth-section">
      <div class="auth-container">
        <div class="auth-card">
          <h1 class="auth-title">Crear Cuenta</h1>
          <p class="auth-subtitle">Únete a nuestra comunidad tech</p>
          
          <div id="auth-error" class="auth-error"></div>
          
          <form id="register-form" class="auth-form">
            <div class="form-group">
              <label for="name">Nombre completo</label>
              <input 
                type="text" 
                id="name" 
                name="name" 
                required 
                placeholder="Tu nombre"
                autocomplete="name"
              />
            </div>
            
            <div class="form-group">
              <label for="email">Correo electrónico</label>
              <input 
                type="email" 
                id="email" 
                name="email" 
                required 
                placeholder="tu@email.com"
                autocomplete="email"
              />
            </div>
            
            <div class="form-group">
              <label for="password">Contraseña</label>
              <div class="password-wrapper">
                <input 
                  type="password" 
                  id="password" 
                  name="password" 
                  required 
                  placeholder="Mínimo 6 caracteres"
                  autocomplete="new-password"
                  minlength="6"
                />
                <button type="button" class="password-toggle" aria-label="Mostrar contraseña">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <div class="form-group">
              <label for="confirm-password">Confirmar contraseña</label>
              <div class="password-wrapper">
                <input 
                  type="password" 
                  id="confirm-password" 
                  name="confirm-password" 
                  required 
                  placeholder="Repite tu contraseña"
                  autocomplete="new-password"
                  minlength="6"
                />
                <button type="button" class="password-toggle" aria-label="Mostrar contraseña">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <button type="submit" class="btn-submit">Registrarse</button>
          </form>
          
          <div class="auth-footer">
            <p>¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__content">
        <p class="footer__copyright">
          &copy; 2024 The Cocktail Store. Todos los derechos reservados.
        </p>
      </div>
    </div>
  </footer>

  <script src="js/services/auth.js"></script>
  <script src="js/ui/authUI.js"></script>
</body>

</html>
